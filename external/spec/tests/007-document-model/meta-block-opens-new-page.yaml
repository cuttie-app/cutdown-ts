id: meta-block-opens-new-page
section: "7.4"
description: A second Meta block opens a new Page when Page.meta is already set

input: |
  ~~~yaml
  title: First
  ~~~

  ~~~yaml
  title: Second
  ~~~

pages:
  - meta:
      type: Meta
      format: yaml
      raw: "title: First\n"
  - meta:
      type: Meta
      format: yaml
      raw: "title: Second\n"
