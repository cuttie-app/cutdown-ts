id: section-bounded-by-container
section: "7.2"
description: A Section inside a block container does not affect the outer Section hierarchy; content after the container belongs to the outer scope

input: |
  = Outer

  - item

    == Inner Section

    inner content

  outer content

ast:
  - type: Section
    level: 1
    heading:
      - type: Text
        value: Outer
    children:
      - type: List
        loose: true
        children:
          - type: ListItem
            children:
              - type: Paragraph
                children:
                  - type: Text
                    value: item
              - type: Section
                level: 2
                heading:
                  - type: Text
                    value: Inner Section
                children:
                  - type: Paragraph
                    children:
                      - type: Text
                        value: inner content
      - type: Paragraph
        children:
          - type: Text
            value: outer content
