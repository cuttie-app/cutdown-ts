id: cdn-0022-duplicate-custom-key
section: '5.1'
description: 'Duplicate custom attribute key in same {} block; first value kept; subsequent dropped; CDN-0022 warning'

input: |
  Hello {role=main role=nav}

ast:
  - type: Paragraph
    children:
      - type: Text
        value: Hello
    attributes:
      - key: role
        value: main

diagnostics:
  - code: CDN-0022
    level: warning
