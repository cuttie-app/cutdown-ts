id: cdn-0020-duplicate-id
section: '5.1'
description: 'Second #id token in same {} block is dropped; first value kept; CDN-0020 warning'

input: |
  Hello {#first #second}

ast:
  - type: Paragraph
    children:
      - type: Text
        value: Hello
    attributes:
      - key: id
        value: first

diagnostics:
  - code: CDN-0020
    level: warning
