id: cdn-0014-emphasis-strong-cross
section: "10.2"
description: "** closes while __ is open inside its content; CDN-0014 at the crossing ** closer; trailing __ is orphaned literal"

input: |
  ** a __ b ** c __

ast:
  - type: Paragraph
    children:
      - type: Emphasis
        children:
          - type: Text
            value: "a __ b"
      - type: Text
        value: " c __"

diagnostics:
  - code: CDN-0014
    level: warning
