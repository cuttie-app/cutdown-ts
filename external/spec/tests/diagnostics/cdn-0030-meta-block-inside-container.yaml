id: cdn-0030-meta-block-inside-container
section: "9.5"
description: "~~~ fence inside a block container is illegal; raw span emitted as Paragraph; CDN-0030 warning emitted on the opening fence line"

input: |
  :::note
  ~~~yaml
  title: foo
  ~~~
  :::

ast:
  - type: NamedBlock
    name: note
    children:
      - type: Paragraph
        children:
          - type: Text
            value: "~~~yaml\ntitle: foo\n~~~"

diagnostics:
  - code: CDN-0030
    level: warning
