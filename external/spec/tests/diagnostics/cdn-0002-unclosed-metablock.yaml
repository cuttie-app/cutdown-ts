id: cdn-0002-unclosed-metablock
section: '9.5'
description: 'Unclosed ~~~ fence; content runs to end of document as Meta raw; CDN-0002 warning emitted'

input: "~~~yaml\ntitle: Hello\n"

pages:
  - meta:
      type: Meta
      format: yaml
      raw: "title: Hello\n"

diagnostics:
  - code: CDN-0002
    level: warning
