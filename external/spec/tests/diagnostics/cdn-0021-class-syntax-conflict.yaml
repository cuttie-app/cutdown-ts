id: cdn-0021-class-syntax-conflict
section: "5.1"
description: ".class syntax has priority over class= in the same {} block; class= is dropped; CDN-0021 warning"

input: |
  Hello {.foo class="bar"}

ast:
  - type: Paragraph
    children:
      - type: Text
        value: Hello
    attributes:
      - key: class
        value: [foo]

diagnostics:
  - code: CDN-0021
    level: warning
