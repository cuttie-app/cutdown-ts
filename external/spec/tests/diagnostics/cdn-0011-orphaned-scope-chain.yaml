id: cdn-0011-orphaned-scope-chain
section: '5.2'
description: 'Three {} tokens on a 2-slot list context; front token has no slot and is discarded; CDN-0011 warning'

input: |
  - text {.a}{.b}{.c}

ast:
  - type: List
    attributes:
      - key: class
        value: [c]
    children:
      - type: ListItem
        attributes:
          - key: class
            value: [b]
        children:
          - type: Text
            value: text

diagnostics:
  - code: CDN-0011
    level: warning
