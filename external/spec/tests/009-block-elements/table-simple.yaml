id: table-simple
section: "9.8.1"
description: Pipe table with no delimiter row; all rows are body rows; no header; columns default to left alignment

input: |
  | Cell A | Cell B |
  | Cell C | Cell D |

ast:
  - type: Table
    kind: simple
    body:
      - type: Row
        children:
          - type: Cell
            row: 0
            column: 0
            children:
              - type: Text
                value: Cell A
          - type: Cell
            row: 0
            column: 1
            children:
              - type: Text
                value: Cell B
      - type: Row
        children:
          - type: Cell
            row: 1
            column: 0
            children:
              - type: Text
                value: Cell C
          - type: Cell
            row: 1
            column: 1
            children:
              - type: Text
                value: Cell D
    columns:
      - type: Column
      - type: Column
