id: quote-block-nested
section: "9.6"
description: ">> produces a QuoteBlock nested inside an outer QuoteBlock (nesting depth = count of leading > chars)"

input: |
  >> Nested quote

ast:
  - type: QuoteBlock
    children:
      - type: QuoteBlock
        children:
          - type: Paragraph
            children:
              - type: Text
                value: Nested quote
