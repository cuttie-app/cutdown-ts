id: thematic-break-inside-listitem
section: "9.3"
description: ThematicBreak inside a list item emits a ThematicBreak node without creating a new Page

input: |
  - item

    ---

    after

ast:
  - type: List
    loose: true
    children:
      - type: ListItem
        children:
          - type: Paragraph
            children:
              - type: Text
                value: item
          - type: ThematicBreak
          - type: Paragraph
            children:
              - type: Text
                value: after
