id: named-block-nested
section: "9.10"
description: NamedBlocks can be nested; inner block is a child of the outer block

input: |
  :::outer

  :::inner
  text
  :::

  :::

ast:
  - type: NamedBlock
    name: outer
    children:
      - type: NamedBlock
        name: inner
        children:
          - type: Paragraph
            children:
              - type: Text
                value: text
