id: named-block-attrs
section: "9.10"
description: "Attributes on the opening ::: line are attached to the NamedBlock node"

input: |
  :::callout {.warning #note1}
  Content
  :::

ast:
  - type: NamedBlock
    name: callout
    attributes:
      - key: class
        value: [warning]
      - key: id
        value: note1
    children:
      - type: Paragraph
        children:
          - type: Text
            value: Content
