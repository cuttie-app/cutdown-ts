id: math-block-attrs
section: "9.12"
description: Attributes on the $$$ opening line are attached to the MathBlock node

input: |
  $$$ {.display #eq1}
  E = mc^2
  $$$

ast:
  - type: MathBlock
    formula: "E = mc^2"
    attributes:
      - key: class
        value: [display]
      - key: id
        value: eq1
