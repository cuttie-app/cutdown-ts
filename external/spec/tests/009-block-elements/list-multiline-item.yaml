id: list-multiline-item
section: '9.7.5'
description: A non-marker continuation line absorbed by the list parser extends the current item; soft break folded to zero, lines concatenate directly

input: |
  - First item
    continues here
  - Second item

ast:
  - type: List
    children:
      - type: ListItem
        children:
          - type: Text
            value: First itemcontinues here
      - type: ListItem
        children:
          - type: Text
            value: Second item
