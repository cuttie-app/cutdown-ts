id: table-gfm
section: "9.8.2"
description: GFM table; delimiter row determines column alignment and separates head from body

input: |
  | Name  | Score |
  |:------|------:|
  | Alice |    42 |
  | Bob   |    17 |

ast:
  - type: Table
    kind: gfm
    head:
      - type: Row
        children:
          - type: Cell
            row: 0
            column: 0
            children:
              - type: Text
                value: Name
          - type: Cell
            row: 0
            column: 1
            children:
              - type: Text
                value: Score
    body:
      - type: Row
        children:
          - type: Cell
            row: 0
            column: 0
            children:
              - type: Text
                value: Alice
          - type: Cell
            row: 0
            column: 1
            children:
              - type: Text
                value: "42"
      - type: Row
        children:
          - type: Cell
            row: 1
            column: 0
            children:
              - type: Text
                value: Bob
          - type: Cell
            row: 1
            column: 1
            children:
              - type: Text
                value: "17"
    columns:
      - type: Column
        align: left
      - type: Column
        align: right
