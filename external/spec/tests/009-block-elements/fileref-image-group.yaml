id: fileref-image-group
section: '9.9.2'
description: Consecutive FileRef lines of the same known group (no blank line) are wrapped in FileRefGroup

input: |
  /photos/a.png
  /photos/b.jpg

ast:
  - type: FileRefGroup
    group: image
    children:
      - type: FileRef
        src: /photos/a.png
        group: image
      - type: FileRef
        src: /photos/b.jpg
        group: image
