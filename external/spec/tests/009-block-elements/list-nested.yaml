id: list-nested
section: "9.7.1"
description: A marker at a greater column than the current item creates a nested List inside a ListItem (2-space indent is the recommended convention)

input: |
  - Item one
    - Nested
  - Item two

ast:
  - type: List
    children:
      - type: ListItem
        children:
          - type: Text
            value: Item one
          - type: List
            children:
              - type: ListItem
                children:
                  - type: Text
                    value: Nested
      - type: ListItem
        children:
          - type: Text
            value: Item two
