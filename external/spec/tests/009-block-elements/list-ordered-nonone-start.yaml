id: list-ordered-nonone-start
section: '9.7.2'
description: Ordered list starting at a number other than 1; start captures the first item number

input: |
  3. Third
  4. Fourth

ast:
  - type: List
    ordered: true
    start: 3
    children:
      - type: ListItem
        children:
          - type: Text
            value: Third
      - type: ListItem
        children:
          - type: Text
            value: Fourth
