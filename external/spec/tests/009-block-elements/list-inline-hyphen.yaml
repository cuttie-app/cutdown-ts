id: list-inline-hyphen
section: '9.7.1'
description: After the list marker `- `, the hyphen has no special meaning in inline content; `- - item` is a single list item with literal text

input: |
  - - - nested item

ast:
  - type: List
    ordered: false
    children:
      - type: ListItem
        children:
          - type: Text
            value: '- - nested item'
