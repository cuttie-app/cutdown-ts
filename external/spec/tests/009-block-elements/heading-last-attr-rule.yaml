id: heading-last-attr-rule
section: "9.1"
description: Explicit empty {} as last token means heading has no attributes; earlier {attrs} attach to inline elements

input: |
  = H1 [link](..){.link-class}{}

ast:
  - type: Section
    level: 1
    heading:
      - type: Text
        value: "H1 "
      - type: Link
        kind: external
        href: ".."
        children:
          - type: Text
            value: link
        attributes:
          - key: class
            value: [link-class]
