id: named-block-basic
section: '9.10'
description: ':::name opens a NamedBlock; ::: on its own line closes it'

input: |
  :::callout
  Some content
  :::

ast:
  - type: NamedBlock
    name: callout
    children:
      - type: Paragraph
        children:
          - type: Text
            value: Some content
