id: table-scope-chain-attrs
section: '9.8.3'
description: 'On the last row, two trailing {} tokens distribute right-to-left: last to Table, preceding to Row'

input: |
  | td1 | td2 | {.row-class}{.table-class}

ast:
  - type: Table
    kind: simple
    body:
      - type: Row
        children:
          - type: Cell
            row: 0
            column: 0
            children:
              - type: Text
                value: td1
          - type: Cell
            row: 0
            column: 1
            children:
              - type: Text
                value: td2
        attributes:
          - key: class
            value: [row-class]
    columns:
      - type: Column
      - type: Column
    attributes:
      - key: class
        value: [table-class]
