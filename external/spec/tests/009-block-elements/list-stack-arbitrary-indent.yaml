id: list-stack-arbitrary-indent
section: '9.7.5'
description: Stack model resolves arbitrary indentation; any col > parent.col nests one level regardless of delta; col <= current.col pops to sibling

input: |
  - item A
      - item B
  - item C

ast:
  - type: List
    children:
      - type: ListItem
        children:
          - type: Text
            value: item A
          - type: List
            children:
              - type: ListItem
                children:
                  - type: Text
                    value: item B
      - type: ListItem
        children:
          - type: Text
            value: item C
