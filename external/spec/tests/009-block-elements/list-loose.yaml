id: list-loose
section: "9.7.3"
description: Blank line between col-0 items resets the list; produces two separate tight List nodes (loose lists require indented items)

input: |
  - Item one

  - Item two

ast:
  - type: List
    loose: false
    children:
      - type: ListItem
        children:
          - type: Text
            value: Item one
  - type: List
    loose: false
    children:
      - type: ListItem
        children:
          - type: Text
            value: Item two
