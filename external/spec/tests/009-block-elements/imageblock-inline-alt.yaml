id: imageblock-inline-alt
section: '9.9.3'
description: ImageBlock alt is parsed by inline rules; emphasis and plain text are valid alt content

input: |
  ![A **bold** caption](photos/shot.jpg)

ast:
  - type: ImageBlock
    alt:
      - type: Text
        value: 'A '
      - type: Emphasis
        children:
          - type: Text
            value: bold
      - type: Text
        value: ' caption'
    src: photos/shot.jpg
