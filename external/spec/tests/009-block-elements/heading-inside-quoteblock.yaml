id: heading-inside-quoteblock
section: "9.1"
description: A heading inside a QuoteBlock is legal; produces a Section as a child of the QuoteBlock

input: |
  > = Heading inside quote
  >
  > paragraph

ast:
  - type: QuoteBlock
    children:
      - type: Section
        level: 1
        heading:
          - type: Text
            value: Heading inside quote
        children:
          - type: Paragraph
            children:
              - type: Text
                value: paragraph
