id: heading-inside-listitem
section: '9.1'
description: A heading inside a list item is legal; produces a Section as a block child of the ListItem

input: |
  - intro

    = Inner Section

    paragraph

ast:
  - type: List
    loose: true
    children:
      - type: ListItem
        children:
          - type: Paragraph
            children:
              - type: Text
                value: intro
          - type: Section
            level: 1
            heading:
              - type: Text
                value: Inner Section
            children:
              - type: Paragraph
                children:
                  - type: Text
                    value: paragraph
