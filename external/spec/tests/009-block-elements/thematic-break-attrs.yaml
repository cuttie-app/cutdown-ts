id: thematic-break-attrs
section: "9.3"
description: ThematicBreak may carry attributes for consumer use

input: |
  Before

  --- {.page-end}

pages:
  - children:
      - type: Paragraph
        children:
          - type: Text
            value: Before
  - children:
      - type: ThematicBreak
        attributes:
          - key: class
            value: [page-end]
