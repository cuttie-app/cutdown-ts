id: attrs-scope-chain-list
section: "5.2"
description: "Two trailing {} on a list item distribute right-to-left: last to List, preceding to ListItem"

input: |
  - item {.item-class}{.list-class}

ast:
  - type: List
    attributes:
      - key: class
        value: [list-class]
    children:
      - type: ListItem
        attributes:
          - key: class
            value: [item-class]
        children:
          - type: Text
            value: item
