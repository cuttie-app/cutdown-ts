id: emphasis-spanning-lines
section: '10.6'
description: Soft break inside an inline block is folded to zero; trailing space before NL preserves word boundary inside inline blocks

input: "**bold \ncontinuation** and **nospace\ncontinuation**\n"

ast:
  - type: Paragraph
    children:
      - type: Emphasis
        children:
          - type: Text
            value: bold continuation
      - type: Text
        value: ' and '
      - type: Emphasis
        children:
          - type: Text
            value: nospacecontinuation
