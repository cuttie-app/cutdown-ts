id: emphasis-triple
section: "10.2"
description: "*** = ** (opener) + * (literal inside); closing *** = ** (closer) + * (literal after)"

input: |
  ***text***

ast:
  - type: Paragraph
    children:
      - type: Emphasis
        children:
          - type: Text
            value: "*text"
      - type: Text
        value: "*"
