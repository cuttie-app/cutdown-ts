id: link-both-brackets-empty
section: '10.7'
description: '[][] with both brackets empty is a valid page link with empty target; allows empty inline anchors with custom attributes when attrs trail the construct'

input: |
  [][]{#anchor .marker}

ast:
  - type: Paragraph
    children:
      - type: Link
        kind: page
        children: []
        target: ''
        attributes:
          - key: id
            value: anchor
          - key: class
            value:
              - marker
