id: variable-id-literal
section: "10.11"
description: Variable key must use ID_LITERAL characters; a key containing non-ID_LITERAL characters is emitted as literal text

input: |
  {{valid-key}} {{invalid key}} {{also.valid_1}}

ast:
  - type: Paragraph
    children:
      - type: Variable
        key: valid-key
      - type: Text
        value: " {{invalid key}} "
      - type: Variable
        key: also.valid_1
