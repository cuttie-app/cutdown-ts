name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'
  pull_request:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: CI
    permissions:
      contents: read
      id-token: write # needed for npm Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # needed to fetch all tags for version comparison

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          always-auth: true
          registry-url: 'https://registry.npmjs.org'

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - run: pnpm install --frozen-lockfile

      - name: Checkout cutdown-spec at matching version
        run: |
          SPEC_VERSION=$(node -p "require('./package.json').version.split('-')[0]")
          SPEC_TAG="v${SPEC_VERSION}"
          git clone --depth 1 --branch "$SPEC_TAG" \
            https://github.com/cuttie-app/cutdown-spec.git \
            src/spec || { echo "ERROR: cutdown-spec tag $SPEC_TAG not found"; exit 1; }

      - run: pnpm run check:format
      - run: pnpm run check:ts
      - run: pnpm run check:lint
      - run: pnpm test

      - run: pnpm run build
      - run: npm publish
        env:
          NPM_TOKEN: ${{ secrets.PUBLISH_KEY }}
#      - run: npm publish --provenance
#        env:
#          NPM_CONFIG_PROVENANCE: true
